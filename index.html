    <style>
        /* ---- COVER (single-viewport landing) ---- */
        .cover-wrap {
            min-height: 100vh;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
        }
        .cover {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 4rem 1.5rem 2rem;
        }
        .cover h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(3.2rem, 9vw, 5.25rem);
            font-weight: 500;
            line-height: 1;
            letter-spacing: -0.02em;
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .cover .chinese-name {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.2rem, 3.5vw, 1.6rem);
            font-weight: 400;
            letter-spacing: 0.22em;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
        }
        .cover .tagline {
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.02em;
            color: var(--text-mid);
            margin-bottom: 3.25rem;
        }

        /* ---- ROUTES (the three doors) ---- */
        .cover-routes {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: clamp(1.5rem, 6vw, 3.75rem);
        }
        .cover-routes a {
            position: relative;
            font-family: 'DM Sans', system-ui, sans-serif;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--text);
            text-decoration: none;
            padding-bottom: 0.45rem;
            transition: color 0.25s ease;
        }
        .cover-routes a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 1px;
            background: var(--border);
            transform: scaleX(1);
            transform-origin: center;
            transition: background-color 0.25s ease, transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .cover-routes a:hover {
            color: var(--accent);
        }
        .cover-routes a:hover::after {
            background: var(--accent);
            transform: scaleX(1.15);
        }

        /* ---- THEME TOGGLE (corner) ---- */
        .toggle-corner {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 20;
        }

        /* ---- FOOTER (minimal, centered, pinned to bottom of viewport) ---- */
        .cover-wrap .footer {
            border-top: none;
            padding: 1.5rem;
            width: 100%;
            max-width: none;
            justify-content: center;
            gap: 1.5rem;
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 640px) {
            .cover { padding-top: 5rem; }
            .cover .tagline { margin-bottom: 2.5rem; }
            .toggle-corner { top: 1rem; right: 1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            .cover-routes a,
            .cover-routes a::after { transition: none; }
        }
    </style>
</head>

    <script>
        // Theme toggle
        const toggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        const saved = localStorage.getItem('theme');
        if (saved) {
            html.setAttribute('data-theme', saved);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
            html.setAttribute('data-theme', 'dark');
        }

        toggle.addEventListener('click', () => {
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });
    </script>
