<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0a0a0c">
<title>Crow's Nest</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0a0a0c; color: #f5f5f7;
    font-family: -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card { text-align: center; padding: 32px; max-width: 26rem; }
  .orb {
    width: 14px; height: 14px; border-radius: 50%; margin: 0 auto 18px;
    background: #0a84ff; box-shadow: 0 0 18px rgba(10,132,255,.55);
  }
  @media (prefers-reduced-motion: no-preference) {
    .checking .orb { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
  }
  h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 8px; }
  p  { font-size: 15px; line-height: 1.5; color: #98989d; margin: 0; }
  .enter {
    display: inline-block; margin: 22px 0 14px; padding: 12px 34px;
    background: #0a84ff; color: #fff; border-radius: 999px;
    font-size: 16px; font-weight: 600; text-decoration: none;
  }
  .enter:active { filter: brightness(.85); }
  .hidden { display: none; }
</style>
</head>
<body class="checking">
  <div class="card">
    <div class="orb"></div>
    <h1>Crow's Nest</h1>
    <p id="checking-msg">Connecting&hellip;</p>
    <div id="entry" class="hidden">
      <a class="enter" href="https://owens-mac-mini.tail8acbc4.ts.net/">Enter</a>
      <p id="entry-note">Taking a while? Tap Enter to go straight in.</p>
    </div>
  </div>
<script>
  // The wall is only reachable from devices on the household's private
  // network. Probe it and auto-forward where the browser allows the probe
  // (Safari, Firefox). Chromium blocks public-page probes to local address
  // space (Local Network Access policy) but never blocks a user-initiated
  // top-level navigation, so the Enter button is the universal path.
  //
  // Timing matters: a cold cross-network mesh handshake (phone on cellular,
  // tunnel not yet warm) can take 5-10 s, so the probe retries for ~12 s and
  // the Enter button appears early rather than only on failure. This is a
  // reachability check, not a health check (any HTTP status counts).
  const WALL = "https://owens-mac-mini.tail8acbc4.ts.net/";
  const showEntry = () => document.getElementById("entry").classList.remove("hidden");
  const giveUp = () => {
    document.body.classList.remove("checking");
    document.getElementById("checking-msg").classList.add("hidden");
    showEntry();
    document.getElementById("entry-note").innerHTML =
      "Private household page.<br>Already set up? Check that the Tailscale " +
      "toggle is on, then tap Enter. Otherwise this page isn't for you.";
  };
  const probe = (timeoutMs) => new Promise((resolve, reject) => {
    const ctrl = new AbortController();
    const timer = setTimeout(() => { ctrl.abort(); reject(new Error("timeout")); }, timeoutMs);
    fetch(WALL, { mode: "no-cors", cache: "no-store", signal: ctrl.signal })
      .then(() => { clearTimeout(timer); resolve(); })
      .catch((e) => { clearTimeout(timer); reject(e); });
  });
  setTimeout(showEntry, 1500);   // early escape hatch while we keep probing
  probe(4000)
    .then(() => location.replace(WALL))
    .catch(() => probe(8000)     // second chance: tunnel may still be warming
      .then(() => location.replace(WALL))
      .catch(giveUp));
</script>
</body>
</html>
