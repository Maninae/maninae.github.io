<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0a0a0c">
<title>Crow's Nest</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0a0a0c; color: #f5f5f7;
    font-family: -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card { text-align: center; padding: 32px; max-width: 26rem; }
  .orb {
    width: 14px; height: 14px; border-radius: 50%; margin: 0 auto 18px;
    background: #0a84ff; box-shadow: 0 0 18px rgba(10,132,255,.55);
  }
  @media (prefers-reduced-motion: no-preference) {
    .checking .orb { animation: pulse 1.6s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: .35 } }
  }
  h1 { font-size: 21px; font-weight: 600; letter-spacing: -0.01em; margin: 0 0 8px; }
  p  { font-size: 15px; line-height: 1.5; color: #98989d; margin: 0; }
  .hidden { display: none; }
</style>
</head>
<body class="checking">
  <div class="card">
    <div class="orb"></div>
    <h1>Crow's Nest</h1>
    <p id="checking-msg">Connecting&hellip;</p>
    <div id="denied-msg" class="hidden">
      <p>This is a private household page.</p>
      <p style="margin-top:8px">If you live here, your device needs a one-time
      setup &mdash; ask Owen to onboard it.</p>
    </div>
  </div>
<script>
  // The wall is only reachable from devices on the household's private
  // network. Probe it (no-cors: an opaque response still proves reachability);
  // redirect on success, otherwise show the polite note. Nothing sensitive is
  // served from this page.
  const WALL = "https://owens-mac-mini.tail8acbc4.ts.net/";
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 3500);
  fetch(WALL, { mode: "no-cors", cache: "no-store", signal: ctrl.signal })
    .then(() => { clearTimeout(timer); location.replace(WALL); })
    .catch(() => {
      clearTimeout(timer);
      document.body.classList.remove("checking");
      document.getElementById("checking-msg").classList.add("hidden");
      document.getElementById("denied-msg").classList.remove("hidden");
    });
</script>
</body>
</html>
