<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla OAuth Callback</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 600px; margin: 80px auto; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
        .code-box { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 20px; margin: 20px 0; word-break: break-all; font-family: monospace; font-size: 14px; user-select: all; cursor: pointer; }
        .label { color: #888; font-size: 13px; margin-bottom: 6px; }
        h1 { color: #e94560; }
        .success { color: #4ecca3; }
        .error { color: #e94560; }
        .hint { color: #888; font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>
    <h1>🔐 Tesla OAuth</h1>
    <div id="result"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');
        const el = document.getElementById('result');

        if (code) {
            el.innerHTML = `
                <p class="success">✅ Authorization successful!</p>
                <div class="label">Authorization Code:</div>
                <div class="code-box" onclick="navigator.clipboard.writeText('${code}').then(()=>this.style.borderColor='#4ecca3')">${code}</div>
                <p class="hint">Click the code to copy it. Send it to Mineru.</p>
                ${state ? `<div class="label">State: ${state}</div>` : ''}
            `;
        } else if (error) {
            el.innerHTML = `<p class="error">❌ Error: ${error}</p><p>${params.get('error_description') || ''}</p>`;
        } else {
            el.innerHTML = `<p class="error">No authorization code received.</p>`;
        }
    </script>
</body>
</html>
